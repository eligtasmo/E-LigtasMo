
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #0F0E0B; height: 100%; width: 100%; overflow: hidden; }
    #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; }
    .mapboxgl-ctrl-bottom-right, .mapboxgl-ctrl-bottom-left { display: none !important; }
    
    /* TACTICAL DOT (PLANNING) */
    .user-dot {
      width: 20px;
      height: 20px;
      background: #2F7BFF;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 0 15px rgba(47, 123, 255, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .user-dot-pulse {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #2F7BFF;
      border-radius: 50%;
      opacity: 0.4;
      animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.33); }
      80%, 100% { opacity: 0; }
    }

    /* WAZE-STYLE 3D ARROW (NAVIGATION) */
    .navigation-puck {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .puck-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }
    /* TACTICAL MARKERS */
    .tactical-marker-inner {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2.5px solid white;
      box-shadow: 0 3px 6px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tactical-marker-inner svg {
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
      mapboxgl.accessToken = 'dummy-token';
      const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [121.41, 14.28],
        zoom: 14,
        antialias: true,
        attributionControl: false,
        dragRotate: false, // Default off
        pitchWithRotate: false
      });
      window.map = map;

      window.userMarker = null; window.destMarker = null; window.loaded = false; window.pendingMessages = [];
      window.manualMode = false; window.lastBearing = 0; window.cachedRouteGeom = []; window.cachedTraffic = [];

      map.on('load', function() {
          map.addSource('route', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [] } } });
          map.addSource('route-traffic', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
          map.addSource('route-alternates', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

          map.addLayer({ id: 'route-alternates-casing', type: 'line', source: 'route-alternates', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': 'rgba(255,255,255,0.05)', 'line-width': 12, 'line-opacity': 0.3 } });
          map.addLayer({ id: 'route-alternates-line', type: 'line', source: 'route-alternates', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': '#777777', 'line-width': 6, 'line-opacity': 0.5 } });
          map.addLayer({ id: 'route-casing', type: 'line', source: 'route', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': '#162033', 'line-width': 15, 'line-opacity': 0.72 } });
          map.addLayer({ id: 'route-line', type: 'line', source: 'route', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': '#2F7BFF', 'line-width': 8, 'line-opacity': 0.98 } });
          map.addLayer({ id: 'route-traffic', type: 'line', source: 'route-traffic', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-width': 5.5, 'line-opacity': 0.95, 'line-color': ['match', ['get', 'level'], 'heavy', '#EF4444', 'moderate', '#F59E0B', '#2F7BFF'] } });

          // 3D BUILDINGS FOR WAZE-STYLE DEPTH
          map.addLayer({
            'id': '3d-buildings',
            'source': 'composite',
            'source-layer': 'building',
            'filter': ['==', 'extrude', 'true'],
            'type': 'fill-extrusion',
            'minzoom': 15,
            'paint': {
              'fill-extrusion-color': '#24221E',
              'fill-extrusion-height': ['get', 'height'],
              'fill-extrusion-base': ['get', 'min_height'],
              'fill-extrusion-opacity': 0.6
            }
          });

          const sendAppMsg = (data) => {
            try {
              const msg = JSON.stringify(data);
              if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
                window.ReactNativeWebView.postMessage(msg);
              } else if (window.parent && window.parent.postMessage) {
                window.parent.postMessage(msg, '*');
              }
            } catch (e) {}
          };

          map.on('movestart', (e) => {
              if (e.originalEvent) {
                window.manualMode = true;
                sendAppMsg({ type: 'MAP_INTERACTION', manual: true });
              }
          });
          
          window.loaded = true;
          window.safeSetLayout = function(id, key, val) {
            if (map.getLayer(id)) map.setLayoutProperty(id, key, val);
          };
          window.safeSetPaint = function(id, key, val) {
            if (map.getLayer(id)) map.setPaintProperty(id, key, val);
          };
          while (window.pendingMessages.length) window.handleSync(window.pendingMessages.shift());
      });

      window.handleSync = function(data) {
          if (!window.loaded) { window.pendingMessages.push(data); return; }
          if (data.type === 'SYNC') {
              // 1. RE-CENTER COMMAND
              if (data.recenter) {
                window.manualMode = false;
              }

              // 2. MAIN ROUTE (Optimized: only update if provided)
              var routeGeom = data.routeGeom;
              if (routeGeom !== undefined) {
                  if (routeGeom && routeGeom.length > 1) {
                      window.cachedRouteGeom = routeGeom;
                      var clean = routeGeom.map(c => [Number(c[0]), Number(c[1])]);
                      map.getSource('route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: clean } });
                      
                      if (data.shouldRefit) {
                          var bounds = new mapboxgl.LngLatBounds();
                          clean.forEach(c => bounds.extend(c));
                          map.fitBounds(bounds, { padding: { top: 98, right: 54, bottom: 232, left: 54 }, duration: 1100, maxZoom: 15.8 });
                          map.easeTo({ pitch: 0, bearing: 0, duration: 800 });
                      }
                  } else {
                      window.cachedRouteGeom = [];
                      map.getSource('route').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: [] } });
                  }
              }

              // 3. TRAFFIC (Optimized: only update if provided)
              if (data.trafficSegments !== undefined) {
                  if (Array.isArray(data.trafficSegments) && data.trafficSegments.length > 0) {
                      window.cachedTraffic = data.trafficSegments;
                      var features = data.trafficSegments.map(seg => ({
                          type: 'Feature',
                          properties: { level: seg.level },
                          geometry: { type: 'LineString', coordinates: seg.coordinates.map(c => [Number(c[0]), Number(c[1])]) }
                      }));
                      map.getSource('route-traffic').setData({ type: 'FeatureCollection', features: features });
                  } else {
                      window.cachedTraffic = [];
                      map.getSource('route-traffic').setData({ type: 'FeatureCollection', features: [] });
                  }
              }

              // 3. MARKERS & POV
              if (data.userLoc) {
                  var userPos = [Number(data.userLoc.lon), Number(data.userLoc.lat)];
                  var isNav = !!data.isNav;

                  if (!window.userMarker) {
                      var el = document.createElement('div');
                      window.userMarker = new mapboxgl.Marker({ 
                        element: el,
                        rotationAlignment: 'map',
                        pitchAlignment: 'map'
                      }).setLngLat(userPos).addTo(map);
                  } else {
                      // TACTICAL MAGNET: Snap puck to route during navigation
                      var activeGeom = window.cachedRouteGeom;
                      if (isNav && activeGeom && activeGeom.length > 1) {
                          var nearestP = userPos;
                          var minD = Infinity;
                          for (var i = 0; i < activeGeom.length; i++) {
                              var p = activeGeom[i];
                              var d = Math.sqrt(Math.pow(p[0]-userPos[0], 2) + Math.pow(p[1]-userPos[1], 2));
                              if (d < minD) { minD = d; nearestP = p; }
                          }
                          userPos = nearestP;
                      }
                      window.userMarker.setLngLat(userPos);
                  }

                  // Super Zoom / Force Zoom
                  if (data.forceZoom) {
                      map.flyTo({
                          center: userPos,
                          zoom: data.forceZoom,
                          pitch: isNav ? 65 : 0,
                          bearing: 0,
                          duration: 2000,
                          essential: true
                      });
                  }

                  // TOGGLE LINE VISIBILITY (Blue base is always visible for reliability)
                  window.safeSetLayout('route-line', 'visibility', 'visible');
                  window.safeSetLayout('route-casing', 'visibility', 'visible');
                  window.safeSetLayout('route-alternates-line', 'visibility', isNav ? 'none' : 'visible');
                  window.safeSetLayout('route-alternates-casing', 'visibility', isNav ? 'none' : 'visible');
                  window.safeSetLayout('route-traffic', 'visibility', isNav ? 'visible' : 'none');
                  window.safeSetPaint('route-traffic', 'line-width', isNav ? 7 : 4.5);

                  // TOGGLE DOT vs PUCK
                  var el = window.userMarker.getElement();
                  if (isNav && el.className !== 'navigation-puck') {
                    el.className = 'navigation-puck';
                    el.innerHTML = '<svg class="puck-svg" viewBox="0 0 100 100">' +
                      '<defs>' +
                        '<filter id="glow" x="-20%" y="-20%" width="140%" height="140%">' +
                          '<feGaussianBlur stdDeviation="3" result="blur" />' +
                          '<feComposite in="SourceGraphic" in2="blur" operator="over" />' +
                        '</filter>' +
                      '</defs>' +
                      '<path d="M50 5 L90 95 L50 78 L10 95 Z" fill="white" stroke="#2F7BFF" stroke-width="4" stroke-linejoin="round" filter="url(#glow)" />' +
                    '</svg>';
                  } else if (!isNav && el.className !== 'user-dot') {
                    el.className = 'user-dot';
                    el.innerHTML = '<div class="user-dot-pulse"></div>';
                    window.userMarker.setRotation(0);
                  }

                  var activeRoute = data.routeGeom || window.cachedRouteGeom;
                  if (isNav && activeRoute && activeRoute.length > 1) {
                      // BEARING LOGIC
                      var nearestIdx = 0;
                      var minDist = Infinity;
                      for (var i = 0; i < activeRoute.length - 1; i++) {
                        var d = Math.sqrt(Math.pow(activeRoute[i][0]-userPos[0], 2) + Math.pow(activeRoute[i][1]-userPos[1], 2));
                        if (d < minDist) { minDist = d; nearestIdx = i; }
                      }
                      var p1 = activeRoute[nearestIdx];
                      var p2 = activeRoute[nearestIdx + 1] || p1;
                      var bearing = 0;
                      if (p1 && p2 && (p1[0] !== p2[0] || p1[1] !== p2[1])) {
                        var lon1 = p1[0] * Math.PI / 180;
                        var lat1 = p1[1] * Math.PI / 180;
                        var lon2 = p2[0] * Math.PI / 180;
                        var lat2 = p2[1] * Math.PI / 180;
                        var y = Math.sin(lon2 - lon1) * Math.cos(lat2);
                        var x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(lon2 - lon1);
                        bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
                      }
                      window.lastBearing = bearing;
                      window.userMarker.setRotation(bearing);
                      // CAMERA FOLLOW
                      if (!window.manualMode) {
                        map.easeTo({
                            center: userPos,
                            pitch: 65,
                            zoom: 18.8,
                            bearing: bearing,
                            padding: { top: 0, bottom: 180, left: 0, right: 0 },
                            duration: 300, // Smoother interpolation for Waze-like feel
                            essential: true
                        });
                      }
                  } else if (isNav) {
                      // ALLOW ROTATION AND PERSPECTIVE IN NAV
                      map.dragRotate.enable();
                      map.touchZoomRotate.enableRotation();
                  } else if (!isNav) {
                      // ENSURE FLAT TACTICAL VIEW IN PLANNING
                      map.dragRotate.disable();
                      map.touchZoomRotate.disableRotation();
                      if (map.getPitch() !== 0 || map.getBearing() !== 0) {
                        map.easeTo({ pitch: 0, bearing: 0, duration: 400 });
                      }
                  }
              }
              
                            if (data.tacticalMarkers && Array.isArray(data.tacticalMarkers)) {
                      if (!window.tacticalMarkers) window.tacticalMarkers = {};
                      
                      // Remove markers not in current data
                      var currentIds = data.tacticalMarkers.map(m => m.id);
                      Object.keys(window.tacticalMarkers).forEach(id => {
                        if (!currentIds.includes(id)) {
                          window.tacticalMarkers[id].remove();
                          delete window.tacticalMarkers[id];
                        }
                      });

                      data.tacticalMarkers.forEach(marker => {
                        if (window.tacticalMarkers[marker.id]) {
                          window.tacticalMarkers[marker.id].setLngLat([marker.lng, marker.lat]);
                          return;
                        }

                        var el = document.createElement('div');
                        el.className = 'tactical-marker';
                        
                        var bgColor = '#EF4444';
                        var icon = '';
                        if (marker.type === 'flood') {
                          bgColor = '#3B82F6';
                          icon = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18s3-3 7-3 7 3 11 3"/><path d="M2 12s3-3 7-3 7 3 11 3"/><path d="M2 6s3-3 7-3 7 3 11 3"/></svg>';
                        } else if (marker.type === 'hazard') {
                          bgColor = '#F59E0B';
                          icon = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
                        } else if (marker.type === 'gas') {
                          bgColor = '#10B981';
                          icon = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13.2V21a1 1 0 001 1h6.7a1 1 0 001-1v-7.8m0 0a5.6 5.6 0 0110.1 3V11a2 2 0 00-2-2h-3.4M12 21h10M12 21a2 2 0 01-2-2v-4.8m10 4.8V11a2 2 0 00-2-2h-3.4M9 21h6"/><path d="M15 2h3a2 2 0 012 2v2a2 2 0 01-2 2h-3a2 2 0 01-2-2V4a2 2 0 012-2z"/><path d="M4 11V5a2 2 0 012-2h3"/><line x1="9" y1="13" x2="9" y2="13"/></svg>';
                        } else if (marker.type === 'shelter') {
                          bgColor = '#059669'; // Emerald
                          icon = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M9 8h1"/><path d="M9 12h1"/><path d="M14 8h1"/><path d="M14 12h1"/><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"/></svg>';
                        } else {
                          icon = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
                        }

                        el.innerHTML = '<div class="tactical-marker-inner" style="background:' + bgColor + '">' + icon + '</div>';
                        window.tacticalMarkers[marker.id] = new mapboxgl.Marker({ 
                          element: el,
                          anchor: 'bottom'
                        }).setLngLat([marker.lng, marker.lat]).addTo(map);
                      });
                  }
              
              if (data.destLoc) {
                  if (window.destMarker) window.destMarker.remove();
                  window.destMarker = new mapboxgl.Marker({ color: '#F25F52' }).setLngLat([data.destLoc.lon, data.destLoc.lat]).addTo(map);
              } else {
                  if (window.destMarker) {
                    window.destMarker.remove();
                    window.destMarker = null;
                  }
              }
              
              if (data.altRouteGeoms && Array.isArray(data.altRouteGeoms) && data.altRouteGeoms.length > 0) {
                  var features = data.altRouteGeoms.map(geom => ({ type: 'Feature', geometry: { type: 'LineString', coordinates: geom.map(c => [Number(c[0]), Number(c[1])]) } }));
                  map.getSource('route-alternates').setData({ type: 'FeatureCollection', features: features });
              } else {
                  map.getSource('route-alternates').setData({ type: 'FeatureCollection', features: [] });
              }
          }
      };

      window.addEventListener('message', (e) => { try { var d = JSON.parse(e.data); if (d.type === 'SYNC') window.handleSync(d); } catch(err){} });
      document.addEventListener('message', (e) => { try { var d = JSON.parse(e.data); if (d.type === 'SYNC') window.handleSync(d); } catch(err){} });
  </script>
</body>
</html>
